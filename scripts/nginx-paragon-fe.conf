# Portal only on admin host + direct IP.
# Unknown / deleted lander domains hit default_server and get 410.

# ---------------------------------------------------------------------------
# Default catch-all: deleted or unknown hostnames (NOT the portal)
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/domain-not-found;
    index index.html;

    location / {
        add_header Cache-Control "no-store" always;
        return 410;
    }

    error_page 410 /index.html;
    location = /index.html {
        internal;
        root /var/www/domain-not-found;
        add_header Cache-Control "no-store" always;
    }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/domain-not-found;
    index index.html;

    location / {
        add_header Cache-Control "no-store" always;
        return 410;
    }

    error_page 410 /index.html;
    location = /index.html {
        internal;
        root /var/www/domain-not-found;
        add_header Cache-Control "no-store" always;
    }
}

# ---------------------------------------------------------------------------
# Portal — direct IP access (ops / debugging only)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name 138.68.231.226;

    root /var/www/paragon-fe/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 138.68.231.226;

    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/paragon-fe/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
